<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkansas Cyber AI</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="./js/input-processor.js"></script>

    <link rel="stylesheet" href="./style/index.module.css">
</head>

<body>
    <div id="app">

        <!-- Route: / -->
        <div id="home-view">
            <div id="welcome-content">
                <h1>Arkansas Cyber Advisor</h1>
                <p class="welcome-subtitle">Ask anything about cybersecurity — for Arkansas students and professionals.</p>

                <div id="suggestions">
                    <button class="suggestion" data-prompt="What are the most common cyberattacks targeting small businesses?">Common attacks on small businesses</button>
                    <button class="suggestion" data-prompt="How do I create a strong password and manage it securely?">Creating strong passwords</button>
                    <button class="suggestion" data-prompt="What should I do if I think my computer has been hacked?">What to do if you've been hacked</button>
                    <button class="suggestion" data-prompt="What cybersecurity certifications should I pursue as a beginner in Arkansas?">Entry-level certifications in Arkansas</button>
                </div>

                <form id="home-form">
                    <div class="input-card">
                        <input type="text" id="homeInput" placeholder="How can I help you today?" autocomplete="off">
                        <button type="submit" id="homeSubmit" aria-label="Send">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="19" x2="12" y2="5"/>
                                <polyline points="5 12 12 5 19 12"/>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Route: /chat/:id -->
        <div id="chat-view">
            <aside id="sidebar">
                <button id="new-chat-btn">+ New Chat</button>
                <div id="chat-list"></div>
            </aside>

            <div id="main">
                <main id="conversation"></main>

                <div id="input-wrapper">
                    <form id="chat-form">
                        <div class="input-card">
                            <input type="text" id="msgInput" placeholder="How can I help you today?" autocomplete="off">
                            <button type="submit" id="msgSubmit" aria-label="Send">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="19" x2="12" y2="5"/>
                                    <polyline points="5 12 12 5 19 12"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
