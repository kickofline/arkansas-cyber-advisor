services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE: /data/cyber_advisor.db
    volumes:
      - db_data:/data
    extra_hosts:
      - "skynet:host-gateway"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

networks:
  internal:

volumes:
  db_data:
  caddy_data:
  caddy_config:
