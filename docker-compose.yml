services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE: /data/cyber_advisor.db
    volumes:
      - db_data:/data
    extra_hosts:
      - "skynet:host-gateway"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    ports:
      - "7869:11434"
    volumes:
      - /home/skynet/ollama/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=1h
      - OLLAMA_MAX_LOADED_MODELS=2
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # Use one of the two GPU methods below. Prefer the simple 'gpus:' line.

    gpus: all
    # OR use device_requests if your compose version lacks 'gpus:'
    # device_requests:
    #   - driver: nvidia
    #     count: all
    #     capabilities: ["gpu"]

    networks:
      - internal

networks:
  internal:
    external: false

volumes:
  db_data:
  caddy_data:
  caddy_config: